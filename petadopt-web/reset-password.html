<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resetear Contraseña - PetAdopt</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family:sans-serif; display:flex; justify-content:center;
           align-items:center; height:100vh; margin:0; background:#FFF7F0; }
    .card { text-align:center; padding:40px; border-radius:20px;
            background:white; box-shadow:0 4px 20px rgba(0,0,0,0.1);
            max-width:400px; width:100%; }
    h1  { color:#F97316; margin-bottom:8px; }
    p   { color:#6B7280; margin-bottom:24px; }
    input {
      width:100%; padding:12px 16px; border-radius:10px;
      border:1.5px solid #e5e7eb; font-size:14px;
      margin-bottom:12px; box-sizing:border-box;
    }
    button {
      width:100%; padding:14px; background:#F97316; color:white;
      border:none; border-radius:10px; font-size:15px;
      font-weight:700; cursor:pointer;
    }
    button:disabled { opacity:0.5; }
    .msg { margin-top:16px; font-size:13px; }
    .ok  { color:#22C55E; }
    .err { color:#EF4444; }
  </style>
</head>
<body>
<div class="card">
  <div style="font-size:48px">🔒</div>
  <h1>Nueva contraseña</h1>
  <p>Ingresa tu nueva contraseña para PetAdopt</p>

  <input type="password" id="password"    placeholder="Nueva contraseña" />
  <input type="password" id="confirm"     placeholder="Confirmar contraseña" />
  <button id="btn" onclick="resetPassword()">Guardar contraseña</button>
  <div id="msg" class="msg"></div>
</div>

<script>
  // Inicializa Supabase con tus credenciales
  const { createClient } = supabase;
  const client = createClient(
    'https://wrwluiyznbfqlbfcvxsy.supabase.co',
    'TU_ANON_KEY_AQUI'   // ← reemplaza con tu anon key
  );

  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const msg      = document.getElementById('msg');
    const btn      = document.getElementById('btn');

    if (!password || password.length < 6) {
      msg.className = 'msg err';
      msg.textContent = '⚠ Mínimo 6 caracteres';
      return;
    }
    if (password !== confirm) {
      msg.className = 'msg err';
      msg.textContent = '⚠ Las contraseñas no coinciden';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Guardando...';

    const { error } = await client.auth.updateUser({ password });

    if (error) {
      msg.className = 'msg err';
      msg.textContent = '⚠ ' + error.message;
      btn.disabled = false;
      btn.textContent = 'Guardar contraseña';
    } else {
      msg.className = 'msg ok';
      msg.textContent = '✅ ¡Contraseña actualizada! Ya puedes iniciar sesión en la app.';
      btn.textContent = '✓ Listo';
    }
  }

  // Supabase pasa el token en el hash de la URL automáticamente
  window.onload = () => {
    const hash = window.location.hash;
    if (!hash.includes('access_token')) {
      document.getElementById('msg').className = 'msg err';
      document.getElementById('msg').textContent = '⚠ Enlace inválido o expirado.';
      document.getElementById('btn').disabled = true;
    }
  };
</script>
</body>
</html>
